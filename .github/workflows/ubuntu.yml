name: Ubuntu Test

on:
  workflow_dispatch:

jobs:
  ubuntu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show system info
        run: |
          echo "Running on Ubuntu"
          uname -a
          lsb_release -a || cat /etc/os-release
          df -h
          free -h
